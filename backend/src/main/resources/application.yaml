spring:
  application:
    name: travel-planner

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travel_planner}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ═══════════════════════════════════════════════════════════════
  # Flyway Configuration (для миграций базы данных)
  # ═══════════════════════════════════════════════════════════════
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:migration
    validate-on-migrate: true
    clean-disabled: true  # Безопасность: запрет на удаление всей базы

server:
  port: ${SERVER_PORT:8080}

# JWT настройки — секрет читается из переменной окружения
jwt:
  secret: ${JWT_SECRET:travel-planner-super-secret-key-change-this-in-production-please}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# CORS — список origins через запятую
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ═══════════════════════════════════════════════════════════════
# OpenAI (AI route generation)
# Установи переменную OPENAI_API_KEY=sk-... для реальной генерации.
# Без ключа используется алгоритмический фолбэк.
# ═══════════════════════════════════════════════════════════════
openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
